name: Unsigned Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  desktop:
    name: unsigned-desktop-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:engine
      - run: npm run validate
      - run: npm run test
      - name: Build desktop bundles
        if: runner.os != 'Linux'
        run: npm run desktop:build

      - name: Build Linux desktop bundles
        if: runner.os == 'Linux'
        working-directory: packages/desktop
        run: npm exec -- tauri build --verbose --bundles appimage,deb,rpm

      - uses: actions/upload-artifact@v4
        with:
          name: towerforge-unsigned-${{ runner.os }}
          if-no-files-found: error
          path: |
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/release/bundle/macos/*.app
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/rpm/*.rpm
