name: Unsigned Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop:
    name: unsigned-desktop-${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
            bundles: dmg
          - os: windows-latest
            artifact: windows
            bundles: nsis,msi
          - os: ubuntu-22.04
            artifact: linux
            bundles: appimage,deb,rpm

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:engine
      - run: npm run validate
      - name: Smoke-test release assembler import
        run: node -e "import('./packages/desktop/scripts/prepare-release.mjs')"
      - run: npm run test

      - name: Build desktop bundles
        working-directory: packages/desktop
        run: npm run build -- --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: towerforge-unsigned-${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/rpm/*.rpm

  assemble:
    name: assemble-release-candidate
    needs: desktop
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          pattern: towerforge-unsigned-*
          path: ${{ runner.temp }}/towerforge-artifacts
          merge-multiple: true

      - name: Prepare checksums and release notes
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="v$(node -p 'require("./package.json").version')"
          fi
          node packages/desktop/scripts/prepare-release.mjs \
            --input "$RUNNER_TEMP/towerforge-artifacts" \
            --output "$RUNNER_TEMP/towerforge-release" \
            --repo-root "$GITHUB_WORKSPACE" \
            --tag "$release_tag" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$(git rev-parse HEAD)"

      - uses: actions/upload-artifact@v4
        with:
          name: towerforge-release-candidate
          if-no-files-found: error
          retention-days: 14
          path: ${{ runner.temp }}/towerforge-release/*

  publish:
    name: publish-unsigned-prerelease
    if: startsWith(github.ref, 'refs/tags/v')
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: towerforge-release-candidate
          path: ${{ runner.temp }}/towerforge-release

      - name: Refuse to replace an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; refusing to replace published assets." >&2
            exit 1
          fi

      - name: Publish unsigned pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t assets < <(find "$RUNNER_TEMP/towerforge-release" -maxdepth 1 -type f ! -name RELEASE_NOTES.md -print | sort)
          if [[ ${#assets[@]} -lt 2 ]]; then
            echo "Expected installers and SHA256SUMS in the release candidate." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --prerelease \
            --title "TowerForge $GITHUB_REF_NAME - Unsigned build" \
            --notes-file "$RUNNER_TEMP/towerforge-release/RELEASE_NOTES.md"
