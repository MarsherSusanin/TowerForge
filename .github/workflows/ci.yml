name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run build:engine
      - run: npm run plugin:build
      - run: npm run plugin:validate
      - run: npm run plugin:smoke
      - run: git diff --exit-code -- plugins/towerforge/runtime plugins/towerforge/assets
      - run: test -z "$(git status --porcelain --untracked-files=all -- plugins/towerforge/runtime plugins/towerforge/assets)"
      - run: npm test
      - run: npm run validate
      - run: npm run sim tutorial_01 60
      - run: npm run maps:compile -- --project examples/starter.tdproj
      - run: npm run build
      - run: npm run test:e2e
