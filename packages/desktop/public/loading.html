<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TowerForge</title>
  <style>
    :root {
      color-scheme: dark;
      background: #101316;
      color: #f1f5f9;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      display: grid;
      gap: 12px;
      justify-items: center;
    }
    .mark {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6ee7b7, #38bdf8 60%, #f59e0b);
      box-shadow: 0 18px 60px rgba(56, 189, 248, 0.18);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: #9ca3af;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"></div>
    <h1>TowerForge</h1>
    <p>Starting Studio...</p>
  </main>
</body>
</html>
